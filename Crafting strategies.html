<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAMMA Needs-Based Crafting Taxonomy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: white;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 32px;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            color: #5a6c7d;
        }
        
        .table-container {
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .table-header {
            display: grid;
            grid-template-columns: 150px 1fr 1fr 1fr;
            background: #f8f9fa;
            border-bottom: 2px solid #ddd;
        }
        
        .header-cell {
            padding: 20px;
            font-weight: 700;
            font-size: 18px;
            text-align: center;
            border-right: 1px solid #ddd;
        }
        
        .header-cell:last-child {
            border-right: none;
        }
        
        .table-row {
            display: grid;
            grid-template-columns: 150px 1fr 1fr 1fr;
            border-bottom: 1px solid #ddd;
            min-height: 120px;
        }
        
        .table-row:last-child {
            border-bottom: none;
        }
        
        .need-cell {
            padding: 20px;
            font-weight: 700;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px solid #ddd;
            background: #fafafa;
        }
        
        .content-cell {
            padding: 20px;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .content-cell:last-child {
            border-right: none;
        }
        
        .strategy-item {
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1.4;
        }
        
        .strategy-text {
            flex: 1;
        }
        
        .frequency-badge {
            background: #e0e0e0;
            color: #333;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            min-width: 35px;
            text-align: center;
        }
        
        .frequency-high {
            background: #ff6b6b;
            color: white;
        }
        
        .frequency-medium {
            background: #ffd93d;
            color: #333;
        }
        
        .frequency-low {
            background: #e0e0e0;
            color: #666;
        }
        
        /* DRAMMA need colors */
        .need-detachment { 
            color: #e74c3c; 
            border-left: 5px solid #e74c3c;
        }
        
        .need-relaxation { 
            color: #3498db; 
            border-left: 5px solid #3498db;
        }
        
        .need-autonomy { 
            color: #2ecc71; 
            border-left: 5px solid #2ecc71;
        }
        
        .need-mastery { 
            color: #f39c12; 
            border-left: 5px solid #f39c12;
        }
        
        .need-meaning { 
            color: #9b59b6; 
            border-left: 5px solid #9b59b6;
        }
        
        .need-affiliation { 
            color: #1abc9c; 
            border-left: 5px solid #1abc9c;
        }
        
        .legend {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>DRAMMA Needs-Based Crafting Taxonomy</h1>
            <p>N = 126 employees | 14 days/assessments, May 2025</p>
        </div>
        
        <div class="table-container">
            <div class="table-header">
                <div class="header-cell"></div>
                <div class="header-cell">Job crafting</div>
                <div class="header-cell">Boundary management</div>
                <div class="header-cell">Off-job crafting</div>
            </div>
            
            <div id="table-body"></div>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <span class="legend-badge frequency-high">50+</span>
                <span>High frequency</span>
            </div>
            <div class="legend-item">
                <span class="legend-badge frequency-medium">10-49</span>
                <span>Medium frequency</span>
            </div>
            <div class="legend-item">
                <span class="legend-badge frequency-low">1-9</span>
                <span>Low frequency</span>
            </div>
        </div>
    </div>
    
    <script>
        const data = [
            {
                need: "Detachment",
                class: "detachment",
                jobCrafting: [
                    { text: "Cognitive crafting: Thinking about off-job time", count: 21 },
                    { text: "Taking breaks", count: 9 }
                ],
                boundaryManagement: [
                    { text: "No work notifications", count: 28 },
                    { text: "Finishing on time", count: 27 },
                    { text: "Complete tasks", count: 21 },
                    { text: "Switch off after working hours", count: 9 },
                    { text: "Commuting", count: 3 }
                ],
                offJobCrafting: [
                    { text: "Cognitive crafting: Switch off from work", count: 67 }
                ]
            },
            {
                need: "Relaxation",
                class: "relaxation",
                jobCrafting: [
                    { text: "Taking breaks, count: 94 },
                    { text: "Taking breaks: Active", count: 44 },
                    { text: "Taking breaks: Social", count: 35 },
                    { text: "Taking breaks: Outdoors", count: 23 },
                    { text: "Taking breaks: Passive", count: 10 },
                    { text: "Reducing demands", count: 10 },
                    { text: "Reducing demands: Take it easy", count: 15 },
                    { text: "Reducing demands: Task delegation", count: 12 },
                    { text: "Commuting", count: 4 }
                ],
                boundaryManagement: [],
                offJobCrafting: [
                    { text: "Active recovery", count: 14 },
                    { text: "Active recovery: Walk/Hike", count: 97 },
                    { text: "Active recovery: Gardening", count: 23 },
                    { text: "Active recovery: Exercise", count: 20 },
                    { text: "Active recovery: Culture", count: 19 },
                    { text: "Passive recovery: Rest", count: 98 },
                    { text: "Passive recovery: Meals", count: 56 },
                    { text: "Passive recovery: TV", count: 54 },
                    { text: "Passive recovery: Sleep/Nap", count: 43  },
                    { text: "Passive recovery: Reading", count: 37 },
                    { text: "Passive recovery: Sauna/Hot shower, Wellness, Shopping, Meditation, Music, Alcohol", count: 26 },
                    { text: "Passive recovery: Shopping, Coffee, Meditation, Music, Alcohol", count: 71 }
                ]
            },
            {
                need: "Autonomy",
                class: "autonomy",
                jobCrafting: [
                    { text: "Planning and prioritizing", count: 147 },
                    { text: "Spatial-temporal crafting: Working time, Work location", count: 45 },
                    { text: "Reducing (hindering) demands: Avoid distractions, Avoid hindering tasks", count: 27 },
                    { text: "Task crafting: Task/Process modification, Music, Task variety", count: 26 },
                    { text: "Cognitive crafting: Self-regulation", count: 21 },
                    { text: "Career crafting", count: 2 }
                ],
                boundaryManagement: [
                    { text: "Managing work-life interface", count: 28 }
                ],
                offJobCrafting: [
                    { text: "Household chores, organizational tasks", count: 53 },
                    { text: "Self-congruent activities", count: 23 },
                    { text: "Travelling, trip, sightseeing", count: 23 },
                    { text: "Planning", count: 14 }
                ]
            },
            {
                need: "Mastery",
                class: "mastery",
                jobCrafting: [
                    { text: "Task accomplishment", count: 94 },
                    { text: "Focus, concentration, efficiency", count: 40 },
                    { text: "Using competence, skills, expertise", count: 36 },
                    { text: "Solving problems/challenges", count: 35 },
                    { text: "Sharing competence, mentoring", count: 16 },
                    { text: "Feedback", count: 10 },
                    { text: "Developing competences", count: 5 }
                ],
                boundaryManagement: [],
                offJobCrafting: [
                    { text: "Sports: Cycling, Gym, Jogging, Yoga, Swimming, Dancing", count: 133 },
                    { text: "Gardening", count: 64 },
                    { text: "Cooking", count: 28 },
                    { text: "Handywork", count: 21 },
                    { text: "Hobby", count: 10 },
                    { text: "Social games", count: 5 },
                    { text: "Playing music", count: 4 },
                    { text: "Activism, volunteering", count: 4 },
                    { text: "Developing competences", count: 3 },
                    { text: "Writing/Drawing", count: 3 }
                ]
            },
            {
                need: "Meaning",
                class: "meaning",
                jobCrafting: [
                    { text: "Cognitive crafting: Positive framing", count: 41 }
                ],
                boundaryManagement: [],
                offJobCrafting: [
                    { text: "Cognitive crafting: Positive framing, Anticipation", count: 42 },
                    { text: "Cognitive crafting: Anticipation", count: 9 }
                ]
            },
            {
                need: "Affiliation",
                class: "affiliation",
                jobCrafting: [
                    { text: "Social resources: Colleagues", count: 114 },
                    { text: "Social resources: Being helpful/kind", count: 28 },
                    { text: "Social resources: Clients", count: 13 },
                    { text: "Social resources: Supervisor", count: 12 },
                    { text: "Team crafting: Task accomplishment, Work/Task planning, Informal event, Experience sharing", count: 41 }
                ],
                boundaryManagement: [],
                offJobCrafting: [
                    { text: "Social resources: Family", count: 135 },
                    { text: "Social resources: Friends", count: 76 },
                    { text: "Social resources: Pets", count: 33 },
                    { text: "Social resources: Partner", count: 29 },
                    { text: "Social resources: FSocial event", count: 9 }
                ]
            }
        ];

        function getFrequencyClass(count) {
            if (count >= 50) return 'frequency-high';
            if (count >= 10) return 'frequency-medium';
            return 'frequency-low';
        }

        function createStrategyItem(strategy) {
            return `
                <div class="strategy-item">
                    <span class="strategy-text">${strategy.text}</span>
                    <span class="frequency-badge ${getFrequencyClass(strategy.count)}">${strategy.count}</span>
                </div>
            `;
        }

        function createTable() {
            const tbody = document.getElementById('table-body');
            
            data.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'table-row';
                
                rowDiv.innerHTML = `
                    <div class="need-cell need-${row.class}">${row.need}</div>
                    <div class="content-cell">
                        ${row.jobCrafting.map(s => createStrategyItem(s)).join('')}
                    </div>
                    <div class="content-cell">
                        ${row.boundaryManagement.map(s => createStrategyItem(s)).join('')}
                    </div>
                    <div class="content-cell">
                        ${row.offJobCrafting.map(s => createStrategyItem(s)).join('')}
                    </div>
                `;
                
                tbody.appendChild(rowDiv);
            });
        }
        
        createTable();
    </script>
</body>
</html>
